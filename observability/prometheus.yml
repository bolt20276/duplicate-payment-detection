global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "flink"
    static_configs:
      - targets: ["flink-jobmanager:9249"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
