version: "3.9"

networks:
  payment_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  grafana_data:
  prometheus_data:

services:

  # ─────────────────────────────────────────────
  # ZOOKEEPER — Kafka coordination
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - payment_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # KAFKA — Event streaming backbone
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - payment_net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # Host access for producer/consumer scripts
      - "9101:9101"       # JMX metrics
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # KAFKA INIT — Creates topics on startup
  # ─────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    networks:
      - payment_net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 5

      echo 'Creating topics...'

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic payments.raw \
        --partitions 6 \
        --replication-factor 1 \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic payments.decisions \
        --partitions 6 \
        --replication-factor 1 \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic payments.deadletter \
        --partitions 3 \
        --replication-factor 1 \
        --config retention.ms=2592000000

      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:29092
      "
    restart: on-failure

  # ─────────────────────────────────────────────
  # KAFKA UI — Topic browser (optional but handy)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - payment_net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ─────────────────────────────────────────────
  # REDIS — Idempotency key state registry
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks:
      - payment_net
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # POSTGRESQL — Medallion warehouse (Bronze / Silver / Gold)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - payment_net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payments_dw
      POSTGRES_USER: ${POSTGRES_USER:-payments_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payments_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payments_user} -d payments_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # FLINK — Stream processing engine
  # ─────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-jobmanager
    networks:
      - payment_net
    ports:
      - "8081:8081"     # Flink Web UI
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 30000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - ./flink:/opt/flink/jobs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: flink-taskmanager
    networks:
      - payment_net
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
    volumes:
      - ./flink:/opt/flink/jobs

  # ─────────────────────────────────────────────
  # PROMETHEUS — Metrics scraping
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    networks:
      - payment_net
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ─────────────────────────────────────────────
  # GRAFANA — Observability dashboards
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    networks:
      - payment_net
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana_provisioning:/etc/grafana/provisioning

  # ─────────────────────────────────────────────
  # AIRFLOW — Batch orchestration (Gold layer DAGs)
  # ─────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.7.3
    container_name: airflow-init
    networks:
      - payment_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-payments_user}:${POSTGRES_PASSWORD:-payments_pass}@postgres/payments_dw
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    command: version
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.7.3
    container_name: airflow-webserver
    networks:
      - payment_net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-payments_user}:${POSTGRES_PASSWORD:-payments_pass}@postgres/payments_dw
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.7.3
    container_name: airflow-scheduler
    networks:
      - payment_net
    depends_on:
      airflow-webserver:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-payments_user}:${POSTGRES_PASSWORD:-payments_pass}@postgres/payments_dw
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler
